name: grexo-fire-rescue
version: "1.3.0"
description: >
  OpenEnv-compatible fire rescue drone swarm simulator with FastAPI endpoints,
  typed schemas, deterministic graders, and a mission-control dashboard.
author: GREXO
license: MIT
tags:
  - openenv
  - robotics
  - emergency-response
  - drones
  - fastapi

api:
  base_url: /
  endpoints:
    reset:
      method: POST
      path: /reset
      request_model: ResetRequest
      response_model: ResetResponse
      request_body:
        content_type: application/json
        required: false
      response_body:
        content_type: application/json
        fields:
          - state
          - reward
          - done
          - info
    state:
      method: GET
      path: /state
      response_model: StateResponse
      response_body:
        content_type: application/json
        fields:
          - state
    step:
      method: POST
      path: /step
      request_model: StepRequest
      response_model: StepResponse
      request_body:
        content_type: application/json
        required: false
      response_body:
        content_type: application/json
        fields:
          - state
          - reward
          - done
          - info

schemas:
  ResetRequest:
    type: object
    additionalProperties: false
    properties:
      scenario:
        type: string
        enum: [Easy, Medium, Hard]
      difficulty:
        type: string
        enum: [Easy, Medium, Hard]
  StepRequest:
    type: object
    additionalProperties: false
    properties:
      commands:
        type: array
        items:
          type: string
    required: []
  DroneState:
    type: object
    additionalProperties: false
    properties:
      id:
        type: string
      x:
        type: integer
      y:
        type: integer
      battery_level:
        type: integer
      payload_capacity:
        type: integer
      role:
        type: string
    required:
      - id
      - x
      - y
      - battery_level
      - payload_capacity
      - role
  DifficultyProfile:
    type: object
    additionalProperties: false
    properties:
      difficulty:
        type: string
        enum: [Easy, Medium, Hard]
      step_penalty:
        type: number
      battery_start:
        type: integer
      payload_start:
        type: integer
      active_fire_tiles:
        type: integer
      rescue_reward:
        type: number
      containment_reward:
        type: number
    required:
      - difficulty
      - step_penalty
      - battery_start
      - payload_start
      - active_fire_tiles
      - rescue_reward
      - containment_reward
  ObservationResponse:
    type: object
    additionalProperties: false
    properties:
      city_grid:
        type: array
        items:
          type: array
          items:
            type: integer
      drones:
        type: array
        items:
          $ref: "#/schemas/DroneState"
      sensor_alert:
        type: array
        minItems: 2
        maxItems: 2
        items:
          type: integer
      scenario:
        type: string
        enum: [Easy, Medium, Hard]
      difficulty_profile:
        $ref: "#/schemas/DifficultyProfile"
    required:
      - city_grid
      - drones
      - sensor_alert
      - scenario
      - difficulty_profile
  CoordinationSummary:
    type: object
    additionalProperties: false
    properties:
      blocking_fire_cleared:
        type: boolean
      suppression_drones:
        type: array
        items:
          type: string
      path_drones:
        type: array
        items:
          type: string
    required:
      - blocking_fire_cleared
      - suppression_drones
      - path_drones
  GraderSummary:
    type: object
    additionalProperties: false
    properties:
      task1_scout_map:
        type: number
        exclusiveMinimum: 0.0
        exclusiveMaximum: 1.0
      task2_containment:
        type: number
        exclusiveMinimum: 0.0
        exclusiveMaximum: 1.0
      task3_coordinated_rescue:
        type: number
        exclusiveMinimum: 0.0
        exclusiveMaximum: 1.0
    required:
      - task1_scout_map
      - task2_containment
      - task3_coordinated_rescue
  StepInfoResponse:
    type: object
    additionalProperties: false
    properties:
      events:
        type: array
        items:
          type: string
      graders:
        $ref: "#/schemas/GraderSummary"
      fire_tiles_remaining:
        type: integer
      civilian_position:
        type: array
        minItems: 2
        maxItems: 2
        items:
          type: integer
      civilian_reached_exit:
        type: boolean
      coordination:
        $ref: "#/schemas/CoordinationSummary"
    required:
      - events
      - graders
      - fire_tiles_remaining
      - civilian_position
      - civilian_reached_exit
      - coordination
  StateResponse:
    type: object
    additionalProperties: false
    properties:
      state:
        $ref: "#/schemas/ObservationResponse"
    required:
      - state
  ResetResponse:
    type: object
    additionalProperties: false
    properties:
      state:
        $ref: "#/schemas/ObservationResponse"
      reward:
        type: number
      done:
        type: boolean
      info:
        type: object
    required:
      - state
      - reward
      - done
      - info
  StepResponse:
    type: object
    additionalProperties: false
    properties:
      state:
        $ref: "#/schemas/ObservationResponse"
      reward:
        type: number
      done:
        type: boolean
      info:
        $ref: "#/schemas/StepInfoResponse"
    required:
      - state
      - reward
      - done
      - info

tasks:
  - id: scout_and_map
    name: Scout And Map
    difficulty: easy
    max_steps: 60
    description: Reveal the civilian location by scanning the target structure.
    grader:
      type: deterministic
      name: grade_task1_scout_and_map
      description: Uses 0.90/0.88/0.70-0.87/0.50/0.30/0.15/0.10 per-step rewards plus capped trajectory modifiers, then clamps with max(0.01, min(0.99, score)).
    score_range:
      min: 0.01
      max: 0.99
    success_criteria: A successful powered scan discovers the civilian and advances the score toward 0.99.
  - id: fire_containment
    name: Fire Containment
    difficulty: medium
    max_steps: 80
    description: Suppress the active fire footprint while preserving the rescue corridor.
    grader:
      type: deterministic
      name: grade_task2_containment
      description: Uses 0.90/0.88/0.70-0.87/0.50/0.30/0.15/0.10 per-step rewards plus capped trajectory modifiers, then clamps with max(0.01, min(0.99, score)).
    score_range:
      min: 0.01
      max: 0.99
    success_criteria: Initial fire tiles are extinguished and the containment score approaches 0.99.
  - id: coordinated_rescue
    name: Coordinated Rescue
    difficulty: hard
    max_steps: 100
    description: Project a safe route and escort the civilian to the exit after suppression.
    grader:
      type: deterministic
      name: grade_task3_coordinated_rescue
      description: Uses 0.90/0.88/0.70-0.87/0.50/0.30/0.15/0.10 per-step rewards plus capped trajectory modifiers, then clamps with max(0.01, min(0.99, score)).
    score_range:
      min: 0.01
      max: 0.99
    success_criteria: The civilian exits safely after suppression and the rescue score approaches 0.99.

runtime:
  entrypoint: app:app
  max_steps: 220
  resources:
    vcpu: 2
    memory_gb: 8

docs:
  swagger: /docs
  openapi: /openapi.json

inference:
  script: inference.py
  log_tags:
    - "[START]"
    - "[STEP]"
    - "[END]"
